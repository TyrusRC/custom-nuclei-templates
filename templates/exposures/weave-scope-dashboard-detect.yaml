# gap: weave-scope-dashboard-detect
id: weave-scope-dashboard-detect

info:
  name: Weave Scope Container Dashboard Exposed
  author: TyrusRC
  severity: low
  description: |
    Detects an exposed Weave Scope dashboard. Weave Scope provides a real-time
    topology and process view of containers and hosts in a cluster, and ships
    with shell-into-container functionality. When the UI is reachable without
    authentication an attacker can pivot directly into running workloads.
  reference:
    - https://github.com/weaveworks/scope
    - https://www.weave.works/docs/scope/latest/introducing/
  tags: custom,exposures,weave-scope,kubernetes,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        case-insensitive: true
        words:
          - "weave scope"
          - "weaveworks"
        condition: and
      - type: word
        part: body
        words:
          - "terminal.js"
          - "scope-ui"
          - "<title>"
        condition: or
