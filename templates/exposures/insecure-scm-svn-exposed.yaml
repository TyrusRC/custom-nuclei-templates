# gap: insecure-scm-svn-exposed
id: insecure-scm-svn-exposed

info:
  name: SVN Repository Artifacts Exposed via HTTP
  author: TyrusRC
  severity: high
  description: |
    Detects a Subversion working copy whose .svn directory is reachable over
    HTTP. Either the wc.db SQLite store or the legacy entries file is
    returned, which exposes the repository URL, revision history, and the
    full set of tracked source files - frequently including secrets and
    deployment scripts.
  reference:
    - https://raw.githubusercontent.com/swisskyrepo/PayloadsAllTheThings/master/Insecure%20Source%20Code%20Management/README.md
    - https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/01-Information_Gathering/03-Review_Webserver_Metafiles_for_Information_Leakage
  tags: custom,exposures,svn,scm,disclosure

http:
  - method: GET
    path:
      - "{{BaseURL}}/.svn/wc.db"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "SQLite format 3"

  - method: GET
    path:
      - "{{BaseURL}}/.svn/entries"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "(?m)^(dir|file)$"
          - "svn://|http(s)?://[^\\s]+"
        condition: or
