# gap: solar-log-500
id: solar-log-500

info:
  name: Solar-Log 500 Web Admin Unauthenticated Access
  author: TyrusRC
  severity: low
  description: |
    Detects a publicly accessible Solar-Log 500 photovoltaic plant management
    web interface. The /lan.html endpoint is served by the embedded IPC@CHIP
    web stack and grants read access to plant production data, inverter
    inventory, and historical yields without authentication, exposing
    operational details of the underlying renewable energy installation.
  reference:
    - https://www.solar-log.com/en/
  tags: custom,exposures,solar-log,iot,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/lan.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        case-insensitive: true
        words:
          - "Server: IPC@CHIP"
      - type: word
        part: body
        words:
          - "Solare Datensysteme"
