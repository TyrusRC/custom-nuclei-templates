# gap: gcp-cloud-functions-unauthenticated-invocation
id: gcp-cloud-functions-unauthenticated-invocation

info:
  name: GCP Cloud Functions Allow Unauthenticated Invocation
  author: TyrusRC
  severity: high
  description: |
    Detects GCP Cloud Functions (1st gen) that permit unauthenticated HTTP
    invocation. A GET request to the *.cloudfunctions.net endpoint without
    an Authorization header returns HTTP 200 with the function response
    rather than the standard 403 "Your client does not have permission to
    get URL" page, indicating an allUsers IAM binding is in place.
  reference:
    - https://raw.githubusercontent.com/HackTricks-wiki/hacktricks-cloud/master/src/pentesting-cloud/gcp-security/gcp-unauthenticated-enum-and-access/gcp-cloud-functions-unauthenticated-enum.md
    - https://cloud.google.com/functions/docs/securing/managing-access-iam
  tags: custom,cloud,gcp,cloudfunctions,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - 'contains(host, ".cloudfunctions.net")'
      - type: word
        part: body
        negative: true
        words:
          - "Your client does not have permission to get URL"
