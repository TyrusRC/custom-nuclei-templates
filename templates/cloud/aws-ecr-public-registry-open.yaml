# gap: aws-ecr-public-registry-open
id: aws-ecr-public-registry-open

info:
  name: AWS ECR Public Registry Endpoint Reachable
  author: TyrusRC
  severity: medium
  description: |
    Detects a reachable Amazon ECR Public registry endpoint
    (*.public.ecr.aws) by probing /v2/. The endpoint advertises the
    Docker Registry HTTP API v2 via the Docker-Distribution-Api-Version
    response header and returns either HTTP 200 (catalog/version probe
    accepted) or HTTP 401 (bearer-token challenge for pulls) while still
    exposing the registry header. Confirming an unintended publication
    of internal images requires reviewing the publishing AWS account's
    repository visibility and IAM policy.
  reference:
    - https://raw.githubusercontent.com/HackTricks-wiki/hacktricks-cloud/master/src/pentesting-cloud/aws-security/aws-unauthenticated-enum-access/aws-ecr-unauthenticated-enum/README.md
    - https://docs.aws.amazon.com/AmazonECR/latest/public/public-registries.html
  tags: custom,cloud,aws,ecr,registry

http:
  - method: GET
    path:
      - "{{BaseURL}}/v2/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 401
      - type: dsl
        dsl:
          - 'contains(host, "public.ecr.aws")'
      - type: word
        part: header
        case-insensitive: true
        words:
          - "docker-distribution-api-version: registry/2.0"
