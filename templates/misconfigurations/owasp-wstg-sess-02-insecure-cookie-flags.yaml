# gap: owasp-wstg-sess-02-insecure-cookie-flags
id: owasp-wstg-sess-02-insecure-cookie-flags

info:
  name: Session Cookie Missing HttpOnly Flag
  author: TyrusRC
  severity: medium
  description: |
    Detects Set-Cookie responses that issue a well-known session cookie
    (PHPSESSID, JSESSIONID, sessionid, connect.sid, laravel_session,
    ASP.NET_SessionId) without the HttpOnly attribute. This template only
    fires when the HttpOnly flag is absent from the response, allowing
    client-side scripts to read the session identifier and enabling session
    theft via cross-site scripting.
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/06-Session_Management_Testing/02-Testing_for_Cookies_Attributes
    - https://owasp.org/www-community/HttpOnly
  tags: custom,misconfig,cookies,session,owasp,wstg

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: regex
        part: header
        regex:
          - '(?i)set-cookie:\s*(PHPSESSID|JSESSIONID|sessionid|connect\.sid|laravel_session|ASP\.NET_SessionId)='
      - type: word
        part: header
        case-insensitive: true
        negative: true
        words:
          - "httponly"
